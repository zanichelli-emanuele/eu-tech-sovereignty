name: Daily price history

# Refreshes the ~5y daily price series (data/prices/*.json) used by the charts,
# plus a snapshot. Price history changes slowly, so once per trading day is enough.

on:
  schedule:
    - cron: "30 5 * * 1-5"   # 05:30 UTC, weekdays (before the EU open)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-prices
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance pandas
      - run: python3 fetch_data.py
      - run: python3 build_snapshot.py
      - name: Commit if changed
        run: |
          git config user.name  "eusov-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices data/live_snapshot.json
          if ! git diff --cached --quiet; then
            git commit -m "daily price refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no change — nothing to commit"
          fi
