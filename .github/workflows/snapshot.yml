name: Live snapshot

# Refreshes price + market cap (EUR) for all listed companies and commits
# data/live_snapshot.json, which the page reads on every open. Runs every ~15 min
# during EU+US market hours (UTC). build_snapshot.py only rewrites the file when a
# value actually moved, so quiet periods produce no commits.

on:
  schedule:
    - cron: "*/15 6-21 * * 1-5"   # every 15 min, 06:00–21:59 UTC, weekdays
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance
      - run: python3 build_snapshot.py
      - name: Commit if changed
        run: |
          git config user.name  "eusov-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/live_snapshot.json; then
            git add data/live_snapshot.json
            git commit -m "live snapshot $(date -u +%H:%MZ)"
            git push
          else
            echo "no change — nothing to commit"
          fi
