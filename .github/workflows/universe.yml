name: Weekly universe scan

# Layer 2 (company roster), SEPARATE from the financial snapshot. Runs the keyless
# deterministic pipeline — discover (STOXX-600 ∪ current) -> classify_sector
# (codes+keywords) -> classify_theme (maintainer-curated rosters) -> sync_universe
# --apply — and commits companies.json + candidates.json (keep-last-good cache) +
# universe_log.json (audit trail) back to the repo. NO API keys, NO model calls.
# Does NOT touch prices; build_snapshot at the end just fills caps for any newly
# added listed company immediately (the 15-min snapshot Action handles the rest).
#
# Schedule = weekly (Sunday). workflow_dispatch = run on demand from the Actions tab.
# Discovery is NEVER tied to page loads — the static site only reads committed files.

on:
  schedule:
    - cron: "0 4 * * 0"      # Sundays 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: universe-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance pandas
      - name: Discover (STOXX-600 ∪ current, keyless)
        run: python3 scripts/discover.py
        env:
          SOURCE: stoxx
          WORKERS: "8"
      - name: Classify (sector codes+keywords, thematic rosters) + sync
        run: |
          python3 scripts/classify_sector.py
          python3 scripts/classify_theme.py
          python3 scripts/sync_universe.py --apply        # guarded: pins curated, empty-file + degraded-discovery guards
      - name: Fill caps for any newly-added listed
        run: python3 build_snapshot.py
      - name: Commit roster + audit trail if changed
        run: |
          git config user.name  "eusov-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/companies.json data/candidates.json data/universe_log.json data/live_snapshot.json
          if ! git diff --cached --quiet; then
            git commit -m "weekly universe scan $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no universe changes this run"
          fi
