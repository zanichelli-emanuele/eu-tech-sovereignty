<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EU·SOV Terminal — EU Tech Sovereignty</title>
<link rel="stylesheet" href="css/style.css">
<script src="lib/chart.umd.js" defer></script>
</head>
<body>
<div id="term">

  <!-- row 1 — command bar -->
  <header id="cmdbar">
    <div class="brand">EU<span class="dot">·</span>SOV<span class="brand-sub">TECH&nbsp;SOVEREIGNTY&nbsp;TERMINAL</span></div>
    <div class="cmd">
      <span class="cmd-go">▸</span>
      <input id="cmd" type="text" autocomplete="off" spellcheck="false" list="cmd-list"
             placeholder="SEARCH COMPANY / DOMAIN — ⏎">
      <datalist id="cmd-list"></datalist>
    </div>
    <div class="cmd-right"><span id="live-ind" class="live-ind" title="checking…">◌</span><span id="clock" class="clock">--:--:--</span><span id="asof" class="asof"></span></div>
  </header>

  <!-- row 2 — workspace -->
  <main id="work">

    <!-- A · UNIVERSE -->
    <section id="universe" class="panel">
      <div class="panel-h">UNIVERSE<span id="uni-count" class="hcount"></span></div>
      <div id="uni-filters" class="filters"></div>
      <div class="uni-wrap">
        <table id="uni-table">
          <thead><tr>
            <th class="th-dom" title="domain"></th>
            <th data-k="ticker">CODE</th>
            <th data-k="name">NAME</th>
            <th data-k="size_eur" class="num">MKT€</th>
            <th data-k="growth" class="num">Δ%</th>
          </tr></thead>
          <tbody id="uni-body"></tbody>
        </table>
      </div>
    </section>

    <!-- B · MAIN (map / matrix) -->
    <section id="mainpanel" class="panel">
      <div class="panel-h tabbar">
        <button class="tab active" data-tab="map">NETWORK MAP</button>
        <button class="tab" data-tab="matrix">MATRIX</button>
        <span class="tab-hint">[M / X]</span>
        <span id="edge-legend" class="edge-legend"></span>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="map-canvas"></canvas>
        <canvas id="matrix-canvas" hidden></canvas>
        <div id="tip" class="tip" hidden></div>
        <div id="map-hint" class="canvas-hint">hover to trace links · click to load · scroll to zoom · drag to pan</div>
      </div>
    </section>

    <!-- C · SECURITY -->
    <section id="security" class="panel">
      <div class="panel-h">SECURITY<span id="sec-id" class="hcount"></span></div>
      <div class="sec-scroll">
        <div id="sec-empty" class="sec-empty">◂&nbsp; SELECT A COMPANY<br><span>from the universe, map or matrix</span></div>
        <div id="sec-content" hidden></div>
      </div>
    </section>

  </main>

  <!-- row 3 — status bar -->
  <footer id="status">
    <span class="disc">● INFORMATIONAL — NOT INVESTMENT ADVICE · verify live quotes</span>
    <span id="stat-counts" class="muted"></span>
    <span id="legend" class="legend"></span>
    <span id="keys" class="keys"></span>
  </footer>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
